<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Metera Browser Bridge</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <header class="hero">
        <h1>Metera</h1>
        <p>Turn this AI chat into reusable context.</p>
      </header>

      <section class="panel">
        <div class="grid-two">
          <label>API base<input id="apiBase" placeholder="https://api.getmetera.com" /></label>
          <label>Namespace<input id="namespace" placeholder="beta-browser-001" /></label>
        </div>
        <label>Beta API key<input id="apiKey" type="password" autocomplete="off" placeholder="Paste your Metera beta key" /></label>
        <button id="saveDirectKeyButton">Sign in</button>
        <div id="loginStatus" class="status"></div>
      </section>

      <section class="panel primary-actions">
        <button id="understandChatButton">Understand this chat</button>
        <button id="captureLatestResponseButton">Capture latest response</button>
        <button id="generateHandoffButton">Generate handoff note</button>
        <button id="exportContextButton">Export context</button>
        <button id="insertHandoffButton" class="secondary">Insert handoff into prompt</button>
        <div id="sessionStatus" class="status"></div>
      </section>

      <section class="panel">
        <h2>Session context</h2>
        <div id="providerStatus" class="card-list"></div>
        <label>Captured text<textarea id="selectedTextPreview" placeholder="Capture the latest response, select text in the page, or type context here."></textarea></label>
        <label>Handoff note<textarea id="handoffOutput" placeholder="Generate or edit a handoff note here."></textarea></label>
      </section>

      <details class="panel">
        <summary>Workflow memory</summary>
        <label>Workflow goal<input id="newWorkflowGoal" placeholder="Example: Set up ROS on Ubuntu without repeating prior setup" /></label>
        <div class="inline">
          <button id="createWorkflowButton">Create workflow</button>
          <button id="saveSummaryButton" class="secondary">Save capture</button>
        </div>
        <div class="inline">
          <button id="composePreviewButton" class="secondary">Preview continue prompt</button>
          <button id="composeInsertButton" class="secondary">Insert continue prompt</button>
        </div>
        <label>Workflow<select id="workflowSelect"></select></label>
        <label>Instruction<textarea id="composeInstruction" placeholder="Optional ask for the next LLM session."></textarea></label>
        <label>Target
          <select id="targetSelect">
            <option value="chatgpt">ChatGPT</option>
            <option value="claude">Claude</option>
            <option value="generic">Generic</option>
            <option value="codex">Codex</option>
          </select>
        </label>
        <label>Mode
          <select id="modeSelect">
            <option value="resume">Resume</option>
            <option value="continue">Continue</option>
            <option value="plan">Plan</option>
            <option value="debug">Debug</option>
            <option value="summarize">Summarize</option>
            <option value="handoff">Handoff</option>
          </select>
        </label>
        <div class="checkbox-row"><input type="checkbox" id="useSelectedTextToggle" checked /><label for="useSelectedTextToggle">Use selected page text when available</label></div>
        <button id="refreshWorkflowsButton" class="secondary">Refresh workflows</button>
        <button id="clearWorkflowSelectionButton" class="secondary">Start clean</button>
        <textarea id="restartPackOutput" placeholder="Continue prompt appears here."></textarea>
        <div id="workflowStatus" class="card-list"></div>
        <div id="sourceTraceOutput" class="trace compact"></div>
        <div id="handoffStatus" class="status"></div>
      </details>

      <details class="panel">
        <summary>Advanced</summary>
        <button id="inspectPromptButton" class="secondary">Inspect prompt target</button>
        <button id="captureSelectionButton" class="secondary">Capture selected text</button>
        <button id="clearLocalCaptureButton" class="secondary">Clear local capture</button>
        <button id="savePermissionsButton" class="secondary">Save permissions</button>
        <div class="checkbox-row"><input type="checkbox" id="permInsert" checked /><label for="permInsert">Allow prompt insertion</label></div>
        <div class="checkbox-row"><input type="checkbox" id="permSaveSummary" checked /><label for="permSaveSummary">Allow saving summaries</label></div>
        <div class="checkbox-row"><input type="checkbox" id="permCaptureSelection" checked /><label for="permCaptureSelection">Allow selected/latest response capture</label></div>
        <label>Local capture retention
          <select id="captureRetentionPolicy">
            <option value="discard_after_save">Delete local preview after save</option>
            <option value="discard_on_popup_close">Keep only while popup is open</option>
            <option value="discard_on_browser_close">Keep until browser session ends</option>
            <option value="keep_until_manual_clear">Keep until manually cleared</option>
          </select>
        </label>
        <label>Manual summary<textarea id="summaryInput" placeholder="Optional note to save with captured context."></textarea></label>
        <label>Classifications
          <select id="classificationSelect" multiple size="8">
            <option value="summary">summary</option>
            <option value="decision">decision</option>
            <option value="blocker">blocker</option>
            <option value="completed_step">completed step</option>
            <option value="pending_step">pending step</option>
            <option value="next_action">next action</option>
            <option value="reusable_snippet">reusable snippet</option>
            <option value="handoff_note">handoff note</option>
            <option value="evidence">evidence</option>
          </select>
        </label>
        <div id="localCaptureStatus" class="status"></div>
        <div id="captureStatus" class="status"></div>
        <div id="permissionStatus" class="status"></div>
        <div id="diagnosticsOutput" class="trace compact"></div>
        <div class="hidden">
          <input id="email" />
          <input id="workspaceId" />
          <input id="challengeId" />
          <input id="verificationCode" />
          <button id="requestCodeButton">Request login code</button>
          <button id="exchangeCodeButton">Exchange code</button>
        </div>
      </details>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
