<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Metera Browser Bridge Options</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <h1>Metera Browser Bridge Options</h1>
      <p class="small">Use the popup for normal operation. This page is for persistent defaults and troubleshooting.</p>
      <section>
        <label>Metera API base
          <input id="apiBase" placeholder="http://localhost:8000" />
        </label>
        <label>Preferred workspace ID
          <input id="workspaceId" placeholder="workspace_1" />
        </label>
        <label>Preferred target
          <select id="defaultTarget">
            <option value="chatgpt">ChatGPT</option>
            <option value="claude">Claude</option>
            <option value="generic">Generic</option>
          </select>
        </label>
        <button id="saveOptionsButton">Save options</button>
        <div id="optionsStatus" class="status"></div>
      </section>
    </main>
    <script src="options.js"></script>
  </body>
</html>
