services:
  pgvector-test:
    image: pgvector/pgvector:pg16
    container_name: metera-pgvector-test
    environment:
      POSTGRES_DB: metera_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d metera_test"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    tmpfs:
      - /var/lib/postgresql/data
